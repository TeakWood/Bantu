# ── Admin Service (ClusterIP) ──────────────────────────────────────────────────
# Internal service: only reachable from within the cluster.
# The gateway references this as http://nanobot-admin:18791.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nanobot-admin
  namespace: bantu
  labels:
    app: nanobot-admin
    app.kubernetes.io/part-of: bantu
spec:
  type: ClusterIP
  selector:
    app: nanobot-admin
  ports:
    - name: http
      port: 18791
      targetPort: 18791
      protocol: TCP
