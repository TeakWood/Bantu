<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bantu Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 48px 56px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; margin-bottom: 8px; }
    p  { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 4px 12px;
      background: #1e3a5f;
      color: #60a5fa;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#x1F916;</div>
    <h1>Bantu Admin</h1>
    <p>The admin console is starting up. API endpoints are available for configuration management.</p>
    <span class="badge">nanobot-ai</span>
  </div>
</body>
</html>
